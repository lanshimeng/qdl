name: Build QDL (Linux)

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libusb-1.0-0-dev libzip-dev meson ninja-build help2man

      - name: Build
        run: |
          meson setup build
          meson compile -C build

      - name: Run tests
        run: meson test -C build

      - name: Package
        run: |
          mkdir -p qdl-linux
          cp build/qdl qdl-linux/
          cp build/qdl.1 qdl-linux/ 2>/dev/null || true
          tar czf qdl-linux.tar.gz qdl-linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-linux
          path: qdl-linux.tar.gz

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: qdl-linux
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/qdl-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
